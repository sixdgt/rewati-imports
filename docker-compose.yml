version: "3.9"

services:
  backend:
    build: ./backend
    container_name: django_app
    restart: always
    env_file:
      - ./backend/.env
    expose:
      - "8000"

  frontend:
    build: ./frontend
    container_name: nextjs_app
    restart: always
    env_file:
      - ./frontend/.env.local
    expose:
      - "3000"